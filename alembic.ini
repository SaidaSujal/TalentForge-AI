# ─────────────────────────────────────────────────────────────────────────────
# TalentForge AI — Alembic Configuration
# ─────────────────────────────────────────────────────────────────────────────
# The database URL is read from the DATABASE_URL environment variable,
# NOT hardcoded here. See env.py for the runtime configuration.

[alembic]
# Path to migration scripts, relative to this file
script_location = alembic

# Template for migration filenames: timestamp_description.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for file timestamps
timezone = UTC

# Maximum line length for migration files (Black compatibility)
truncate_slug_length = 40

# Whether to prepend revision IDs to filenames
prepend_rev = false

# Use 'true' to enable schema-aware generation
sourceless = false

# Revision environment variables (see env.py)
# version_locations = %(here)s/alembic/versions

[post_write_hooks]
# No post-write hooks configured

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
